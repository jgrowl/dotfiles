- name: Ensure user exists (optional if already present)
  become: true
  user:
    name: "{{ sway_user }}"
    state: present
    create_home: yes

- name: Ensure render/video groups exist
  become: true
  group:
    name: "{{ item }}"
    state: present
  loop:
    - render
    - video

- name: Ensure user is in render/video groups
  become: true
  user:
    name: "{{ sway_user }}"
    groups: "render,video"
    append: true
  notify: Restart sway on tty1

- name: Install sway-tty1 systemd unit
  become: true
  template:
    src: sway-tty1@.service.j2
    dest: /etc/systemd/system/sway-tty1@.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart sway on tty1

- name: Enable and start sway on tty1
  become: true
  systemd:
    name: "sway-tty1@{{ sway_user }}.service"
    enabled: yes
    state: started

- name: Disable getty@tty1 (handled by Conflicts= but keep it clean)
  become: true
  systemd:
    name: getty@tty1.service
    enabled: no
    state: stopped



