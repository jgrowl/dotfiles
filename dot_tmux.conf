set -g mode-keys vi
set -g status-position top
set -g base-index 1
set -g renumber-windows on
#set -g default-terminal 'screen-256color'
set -g history-file ~/._tmux-history
# set -g prompt-history-limit 10000

# Copy mode
bind -n C-o copy-mode
bind -n M-p paste-buffer -p
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
# Copy-mode (vi) → send selection to clipboard and exit copy-mode
#
#
# # I'm turning these off to use previous one to see if it fixes something
# bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "wl-copy"
# bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"


# Mouse drag to select in copy-mode → copy to clipboard automatically
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# Sesh config
bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '?  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(?  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(??  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(??  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(??  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(??  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(?  )+reload(sesh list)'
)\""

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
#set -g @plugin 'catppuccin/tmux#v1.0.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'catppuccin/tmux'


# # Ressurect stuff
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'


# Options to make tmux more pleasant
set -g mouse on
set -g set-clipboard on   # Let tmux try OSC 52; harmless to keep on
set -g default-terminal "tmux-256color"


# Allow applications/shell to set the terminal title via escape sequences
#set -g allow-rename on
#
# Also update terminal title when switching windows (useful if you want tmux window names shown)  will look like-->  chezmoi:editor
# set -g set-titles on
# set -g set-titles-string '#S:#W'
#
# If you do NOT want tmux window names in the title and instead want the shell's cwd title:
#set -g set-titles off


# Do NOT rename tmux windows automatically
set -g automatic-rename off

# Do NOT let apps rename tmux windows
set -g allow-rename off

# DO set the outer terminal title, using the active pane title
set -g set-titles on
set -g set-titles-string "#{pane_title}"


# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato" # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
# leave this unset to let applications set the window title
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_mauve}"

# Load catppuccin
#run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
# For TPM, instead use 
# run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_directory}"


## 2025 12/31 - added this to try to fix sesh errors
# Keep PATH in sync with your login shell
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY PATH"

# Ensure tmux always includes your user bins even if login env is minimal
set -g default-command "${SHELL} -l"
set -g default-shell "${SHELL}"



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
