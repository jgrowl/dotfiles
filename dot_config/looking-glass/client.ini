
[win]
fullScreen=yes

[input]
autoCapture=yes              ; try to keep the mouse captured when needed
captureOnFocus=yes           ; auto-enter capture when the window is focused
grabKeyboard=yes             ; grab keyboard while captured
hideCursor=yes               ; hide host cursor
rawMouse=yes                 ; “relative” in old guides → use raw mouse here
mouseSens=0                  ; tweak with ScrLk+Insert/Del

[spice]
enable=yes
input=yes
captureOnStart=yes           ; capture as soon as the client starts
scaleCursor=yes

